<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncDrop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e3a8a, #0f172a 40%, #020617 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            width: 90%;
            max-width: 400px;
            position: relative;
            z-index: 10;
        }
        .bg-orb {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, rgba(0,0,0,0) 70%);
            top: -100px;
            right: -100px;
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }
        .upload-zone {
            border: 2px dashed rgba(148, 163, 184, 0.3);
            background: rgba(255, 255, 255, 0.02);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .upload-zone:hover, .upload-zone:focus-within {
            border-color: #38bdf8;
            background: rgba(56, 189, 248, 0.05);
            transform: translateY(-2px);
        }
        .btn-primary {
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            transition: all 0.3s ease;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.4);
        }
        .btn-primary:disabled {
            cursor: not-allowed;
        }
        .icon-container {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.2), rgba(37, 99, 235, 0.2));
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            transition: all 0.3s ease;
        }
    </style>
    <script>
        function updateFileName(input) {
            const fileCount = input.files.length;
            const fileNameDisplay = document.getElementById('fileName');
            const submitBtn = document.getElementById('submitBtn');
            const uploadZoneText = document.getElementById('uploadZoneText');
            const uploadIcon = document.getElementById('uploadIcon');
            const iconWrapper = document.getElementById('iconWrapper');
            
            if (fileCount === 0) {
                fileNameDisplay.innerText = '';
                submitBtn.disabled = true;
                submitBtn.style.opacity = '0.5';
                uploadZoneText.innerText = 'Tap to Browse Files';
                uploadIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />';
                iconWrapper.style.background = 'linear-gradient(135deg, rgba(56, 189, 248, 0.2), rgba(37, 99, 235, 0.2))';
                uploadIcon.classList.remove('text-emerald-400');
                uploadIcon.classList.add('text-sky-400');
            } else {
                if (fileCount === 1) {
                    fileNameDisplay.innerText = input.files[0].name;
                } else {
                    fileNameDisplay.innerText = fileCount + ' files selected';
                }
                submitBtn.disabled = false;
                submitBtn.style.opacity = '1';
                uploadZoneText.innerText = 'Files ready to send';
                uploadIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />';
                iconWrapper.style.background = 'linear-gradient(135deg, rgba(52, 211, 153, 0.2), rgba(16, 185, 129, 0.2))';
                uploadIcon.classList.remove('text-sky-400');
                uploadIcon.classList.add('text-emerald-400');
            }
        }
    </script>
</head>
<body>
    <div class="bg-orb"></div>
    <div class="glass-card text-center">
        <div class="flex items-center justify-center gap-3 mb-2">
            <svg class="w-8 h-8 text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
            <h1 class="text-2xl font-bold tracking-tight">SyncDrop</h1>
        </div>
        <p class="text-slate-400 text-sm mb-8 font-medium">Connected to PC. Select files to send.</p>
        
        <form method="POST" enctype="multipart/form-data" class="space-y-4">
            <label class="block w-full upload-zone rounded-2xl p-8 cursor-pointer relative overflow-hidden group">
                <div class="icon-container" id="iconWrapper">
                    <svg id="uploadIcon" class="w-7 h-7 text-sky-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                </div>
                <span id="uploadZoneText" class="text-slate-200 font-semibold block mb-1">Tap to Browse Files</span>
                <span class="text-slate-500 text-xs">Photos, Videos, Documents</span>
                <input type="file" name="file" class="hidden" multiple required onchange="updateFileName(this)">
            </label>
            <p id="fileName" class="text-sm text-emerald-400 font-medium truncate px-2 h-5 flex items-center justify-center"></p>
            
            <button id="submitBtn" type="submit" disabled style="opacity: 0.5" class="w-full btn-primary text-white font-semibold py-4 rounded-xl flex items-center justify-center gap-2 mt-4 shadow-lg shadow-blue-500/20">
                <span>Send to PC</span>
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </button>
        </form>
    </div>
</body>
</html>
